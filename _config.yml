baseurl: '/'
permalink: pretty
title: 'APM CMS'
email: "contato@apmcms.org.br"
description: "Associação de Pais e Mestres do Colégio Militar de Salvador"
url: "https://apmcms.github.io"
logo:
  mobile: "images/logo/logo-apm.png"
  mobile_height: "40px"
  mobile_width: "40px"
  desktop: "images/logo/logo-apm.png"
  desktop_height: "60px"
  desktop_width: "60px"
  # mobile: "images/logo/logo-mobile.svg"
  # mobile_height: "32px"
  # mobile_width: "32px"
  # desktop: "images/logo/logo.svg"
  # desktop_height: "32px"
  # desktop_width: "120px"

home: 
  limit_services: 6

collections:
  services:
    output: true
    sort_by: weight
  team:
    output: true

defaults:
  - scope:
      path: ""
      type: "services"
    values:
      layout: "service"
  - scope:
      path: ""
      type: "team"
    values:
      layout: "team"

sass:
  style: compressed # possible values: nested expanded compact compressed

plugins:
  - jekyll-environment-variables

exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor/bundle/
  - vendor/cache/
  - vendor/gems/
  - vendor/ruby/
  - LICENSE.md
  - LICENSE
  - README.md
